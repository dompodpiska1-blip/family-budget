<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Семейный бюджет</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080b14;--surface:#0e1220;--card:#131825;--card2:#181e2e;--border:#1f2640;
  --accent:#5b7fff;--ag:rgba(91,127,255,.22);
  --green:#3de8a0;--gg:rgba(61,232,160,.18);
  --red:#ff5c7a;--rg:rgba(255,92,122,.18);
  --yellow:#ffc84a;--text:#dde4ff;--muted:#5a6487;--muted2:#2e3555;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:100px;overflow-x:hidden}
body::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:700px;height:350px;background:radial-gradient(ellipse,rgba(91,127,255,.07) 0%,transparent 70%);pointer-events:none;z-index:0}
header{background:rgba(8,11,20,.93);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:13px 16px;position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;box-shadow:0 0 14px var(--ag)}
.logo-text{font-size:.9rem;font-weight:700}.logo-text span{color:var(--accent)}
.hdr-right{display:flex;align-items:center;gap:8px}
.month-nav{display:flex;align-items:center;gap:6px}
.mnb{background:var(--card2);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s}
.mnb:hover{border-color:var(--accent)}
#monthLabel{font-size:.8rem;font-weight:700;min-width:90px;text-align:center}
.btn-stat{background:var(--card2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .15s}
.btn-stat:hover{border-color:var(--accent)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.ov.show{opacity:1;pointer-events:all}
.modal{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:26px 22px;width:100%;max-width:320px;box-shadow:0 24px 60px rgba(0,0,0,.6);transform:translateY(12px);transition:transform .22s}
.ov.show .modal{transform:translateY(0)}
.modal h2{font-size:1.05rem;font-weight:800;margin-bottom:5px}
.modal p{font-size:.78rem;color:var(--muted);margin-bottom:16px;line-height:1.55}
.avatars{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:14px}
.avb{background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:7px 11px;font-size:1.15rem;cursor:pointer;transition:all .15s}
.avb:hover,.avb.sel{border-color:var(--accent);background:rgba(91,127,255,.14);transform:scale(1.1)}
.mni{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-size:.98rem;font-weight:600;padding:12px 15px;outline:none;font-family:inherit;transition:border .15s;margin-bottom:13px;text-align:center}
.mni:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ag)}
.btnc{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;font-size:.92rem;font-weight:700;cursor:pointer}
.stat-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(10px);z-index:400;opacity:0;pointer-events:none;transition:opacity .25s;overflow-y:auto}
.stat-ov.show{opacity:1;pointer-events:all}
.stat-panel{background:var(--surface);min-height:100vh;padding:0 0 80px}
.stat-hdr{background:rgba(8,11,20,.95);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.stat-hdr h2{font-size:1rem;font-weight:800}.stat-hdr h2 span{color:var(--accent)}
.stat-close{background:var(--card2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stitle{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin:16px 16px 10px;display:flex;align-items:center;gap:6px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.nbar{margin:0 16px 10px}
.nbar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.nbar-cat{display:flex;align-items:center;gap:7px;font-size:.83rem;font-weight:600}
.nbar-amt{font-size:.83rem;font-weight:700;color:var(--yellow)}
.nbar-pct{font-size:.7rem;color:var(--muted);margin-left:4px}
.nbar-track{height:7px;background:var(--border);border-radius:10px;overflow:hidden}
.nbar-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .8s cubic-bezier(.22,1,.36,1)}
.plist{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#a78bfa)}
.ptop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.pwho{display:flex;align-items:center;gap:8px}
.pav{font-size:1.3rem}.pname{font-size:.9rem;font-weight:700}
.ptotal{font-size:1.1rem;font-weight:800;color:var(--red)}
.ptrack{height:5px;background:var(--border);border-radius:10px;overflow:hidden;margin-bottom:3px}
.pfill{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--red),var(--yellow));transition:width .8s}
.ppct{font-size:.7rem;color:var(--muted);text-align:right}
.pcats{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.pcpill{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:3px 8px;font-size:.7rem;color:var(--muted)}
.stotals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 16px 0}
.stcard{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:13px;text-align:center}
.stcard-l{font-size:.63rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.stcard-v{font-size:1rem;font-weight:800}
.stcard.inc .stcard-v{color:var(--green)}.stcard.exp .stcard-v{color:var(--red)}
.who-bar{display:flex;align-items:center;padding:11px 16px 0;z-index:1;position:relative}
.who-chip{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--border);border-radius:18px;padding:6px 13px 6px 9px;cursor:pointer;transition:border-color .15s}
.who-chip:hover{border-color:var(--accent)}
.wav{font-size:1.15rem}.wname{font-size:.8rem;font-weight:600}.wedit{font-size:.66rem;color:var(--muted)}
.fb-status{display:inline-flex;align-items:center;gap:5px;background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:5px 10px;font-size:.7rem;color:var(--muted);margin-left:8px}
.fb-dot{width:7px;height:7px;border-radius:50%;background:var(--muted2)}
.fb-dot.ok{background:var(--green);box-shadow:0 0 6px var(--gg)}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:12px 16px 0;z-index:1;position:relative}
.sc{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 8px;text-align:center}
.slbl{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.samt{font-size:.88rem;font-weight:800}
.sc.inc .samt{color:var(--green)}.sc.exp .samt{color:var(--red)}.sc.bal .samt{color:var(--accent)}
.pw{padding:12px 16px 0;z-index:1;position:relative}
.pt{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:5px}
.pb{height:5px;background:var(--border);border-radius:10px;overflow:hidden}
.pf{height:100%;border-radius:10px;background:linear-gradient(90deg,var(--green),var(--accent));transition:width .5s}
.pf.danger{background:linear-gradient(90deg,var(--yellow),var(--red))}
.tabs{display:flex;gap:6px;padding:12px 16px 0;z-index:1;position:relative}
.tab{flex:1;padding:9px 0;border-radius:11px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s}
.tab.active{background:linear-gradient(135deg,var(--accent),#7b6fff);color:#fff;border-color:transparent;box-shadow:0 3px 14px var(--ag)}
.cat-wrap{padding:11px 16px 0;z-index:1;position:relative}
.pills{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:3px}
.pills::-webkit-scrollbar{display:none}
.pill{white-space:nowrap;padding:6px 12px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px;flex-shrink:0}
.pill.active{background:var(--card2);color:var(--text);border-color:var(--accent);box-shadow:0 0 10px var(--ag)}
.add-form{background:var(--card);border:1px solid var(--border);border-radius:16px;margin:12px 16px 0;padding:16px;display:none;position:relative;z-index:1;overflow:hidden}
.add-form::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),#a78bfa,var(--green))}
.add-form.visible{display:block}
.fl{display:block;font-size:.67rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:8px}
.fi{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.87rem;padding:10px 11px;outline:none;transition:border .15s;font-family:inherit}
.fi:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ag)}
.cat-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cat-btn{padding:6px 10px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:.76rem;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit}
.cat-btn.active{border-color:var(--accent);background:rgba(91,127,255,.18);color:var(--text)}
.amt-row{display:flex;gap:9px;margin-bottom:10px;align-items:flex-end}
.amt-row>div{flex:1}
.btns{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),#a78bfa);color:#fff;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 4px 18px var(--ag);margin-top:4px}
.btns:disabled{opacity:.4;cursor:default}
.entries{padding:12px 16px 0;z-index:1;position:relative}
.dlbl{font-size:.68rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:10px 2px 5px}
.entry{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px 13px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;gap:9px;animation:ei .22s ease}
@keyframes ei{from{opacity:0;transform:translateX(-5px)}to{opacity:1;transform:translateX(0)}}
.el{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.eico{width:38px;height:38px;border-radius:11px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;border:1px solid var(--border)}
.einfo{min-width:0}
.ecat{font-size:.83rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.enote{font-size:.73rem;color:var(--muted);margin-top:1px}
.emeta{font-size:.67rem;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:4px}
.ewho{background:var(--card2);border-radius:5px;padding:1px 6px;font-size:.65rem;color:var(--green);font-weight:700;border:1px solid rgba(61,232,160,.18)}
.er{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.eamt{font-size:.94rem;font-weight:800}
.eamt.income{color:var(--green)}.eamt.expense{color:var(--red)}
.bdel{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:.69rem;padding:1px;transition:color .15s}
.bdel:hover{color:var(--red)}
.empty{text-align:center;color:var(--muted);font-size:.84rem;padding:48px 20px}
.fab{position:fixed;bottom:22px;right:18px;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#a78bfa);border:none;color:#fff;font-size:1.6rem;cursor:pointer;box-shadow:0 4px 22px var(--ag);z-index:300;transition:all .22s;display:flex;align-items:center;justify-content:center}
.fab.open{background:linear-gradient(135deg,var(--red),#ff8fa3);transform:rotate(45deg)}
</style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<!-- Name Modal -->
<div class="ov" id="nameModal">
  <div class="modal">
    <h2>👋 Как вас зовут?</h2>
    <p>Имя будет видно рядом с каждой записью.</p>
    <div class="avatars" id="avPicker">
      <button class="avb" onclick="pickAv('🧑',this)">🧑</button>
      <button class="avb" onclick="pickAv('👩',this)">👩</button>
      <button class="avb" onclick="pickAv('👨',this)">👨</button>
      <button class="avb" onclick="pickAv('👴',this)">👴</button>
      <button class="avb" onclick="pickAv('👵',this)">👵</button>
      <button class="avb" onclick="pickAv('🧒',this)">🧒</button>
    </div>
    <input class="mni" id="nameInp" type="text" placeholder="Введите имя..." maxlength="20" onkeydown="if(event.key==='Enter')saveName()"/>
    <button class="btnc" onclick="saveName()">Сохранить</button>
  </div>
</div>

<!-- Stat Overlay -->
<div class="stat-ov" id="statOv">
  <div class="stat-panel">
    <div class="stat-hdr">
      <h2>⚡ <span>Аналитика</span></h2>
      <button class="stat-close" onclick="closeStat()">✕</button>
    </div>
    <div id="statContent"></div>
  </div>
</div>

<header>
  <div class="logo">
    <div class="logo-icon">💰</div>
    <div class="logo-text">Семейный <span>бюджет</span></div>
  </div>
  <div class="hdr-right">
    <button class="btn-stat" onclick="openStat()">📊</button>
    <div class="month-nav">
      <button class="mnb" onclick="prevM()">‹</button>
      <span id="monthLabel"></span>
      <button class="mnb" onclick="nextM()">›</button>
    </div>
  </div>
</header>

<div class="who-bar">
  <div class="who-chip" onclick="openModal()">
    <span class="wav" id="wAv">🧑</span>
    <div><div class="wname" id="wName">Не указано</div><div class="wedit">нажмите для изменения</div></div>
  </div>
  <div class="fb-status" id="fbStatus">
    <div class="fb-dot" id="fbDot"></div>
    <span id="fbTxt">локально</span>
  </div>
</div>

<div class="summary">
  <div class="sc inc"><div class="slbl">Доходы</div><div class="samt" id="sInc">0 ₴</div></div>
  <div class="sc exp"><div class="slbl">Расходы</div><div class="samt" id="sExp">0 ₴</div></div>
  <div class="sc bal"><div class="slbl">Остаток</div><div class="samt" id="sBal">0 ₴</div></div>
</div>

<div class="pw" id="pwrap" style="display:none">
  <div class="pt"><span>Расходы от доходов</span><span id="pPct">0%</span></div>
  <div class="pb"><div class="pf" id="pFill" style="width:0%"></div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setTab('expense',this)">📤 Расходы</button>
  <button class="tab" onclick="setTab('income',this)">📥 Доходы</button>
</div>

<div class="cat-wrap"><div class="pills" id="pills"></div></div>

<div class="add-form" id="addForm">
  <span class="fl">Категория</span>
  <div class="cat-btns" id="catBtns"></div>
  <div class="amt-row">
    <div><span class="fl">Сумма (₴)</span><input class="fi" id="amtInp" type="text" inputmode="decimal" placeholder="0"/></div>
    <div><span class="fl">Комментарий</span><input class="fi" id="noteInp" type="text" placeholder="Необязательно"/></div>
  </div>
  <button class="btns" id="btnAdd" onclick="addEntry()">+ Добавить запись</button>
</div>

<div class="entries" id="list"></div>
<button class="fab" id="fab" onclick="toggleForm()">+</button>

<script>
// ══════════ FIREBASE CONFIG ══════════
var FB_CONFIG = {
  apiKey:            "AIzaSyAdHxQHN0TP_9ffQLXJGB794LVHqqhqHmc",
  authDomain:        "cash-65d03.firebaseapp.com",

var TG_CHAT  = "537116615";
// ═════════════════════════════════════

var CATS = {
  expense:[
    {id:'food',      icon:'🛒', name:'Продукты'},
    {id:'housing',   icon:'🏠', name:'Жильё/аренда'},
    {id:'utilities', icon:'💡', name:'Коммуналка'},
    {id:'car',       icon:'🚗', name:'Автомобиль'},

    {id:'health',    icon:'💊', name:'Аптека'},

  ]
};

function getCat(type,id){
  return (CATS[type]||[]).find(function(c){return c.id===id})||{id:id,icon:'📦',name:id};
}

var curTab='expense', curFilter='all';
var curYear=new Date().getFullYear(), curMonth=new Date().getMonth();
var formOpen=false;
var uAv=localStorage.getItem('uAv')||'🧑';
var uName=localStorage.getItem('uName')||'';
var selAv=uAv;
var entries=[];
var fbDb=null;
var selectedCat='food'; // глобальная переменная для выбранной категории
var MONTHS=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];

function lsKey(){return 'bgt_v4'}
function loadLocal(){try{var d=localStorage.getItem(lsKey());return d?JSON.parse(d):[]}catch(e){return[]}}
function saveLocal(arr){try{localStorage.setItem(lsKey(),JSON.stringify(arr))}catch(e){}}

function initFirebase(){
  try{
    firebase.initializeApp(FB_CONFIG);
    fbDb=firebase.database();
    document.getElementById('fbDot').className='fb-dot ok';
    document.getElementById('fbTxt').textContent='синхронизация';
    fbDb.ref('entries').on('value',function(snap){
      entries=[];
      if(snap.exists()) snap.forEach(function(c){entries.push(Object.assign({id:c.key},c.val()))});
      entries.sort(function(a,b){return b.ts-a.ts});
      saveLocal(entries);
      render();
    });
  }catch(e){console.warn(e)}
}

initFirebase();
if(!fbDb){entries=loadLocal();}

updateMonthLbl();
buildPills();
buildCatBtns();
updateWhoBar();
render();
if(!uName) setTimeout(openModal,700);

function updateMonthLbl(){
  document.getElementById('monthLabel').textContent=MONTHS[curMonth].slice(0,3)+' '+curYear;
}
function prevM(){curMonth--;if(curMonth<0){curMonth=11;curYear--;}curFilter='all';updateMonthLbl();buildPills();render()}
function nextM(){curMonth++;if(curMonth>11){curMonth=0;curYear++;}curFilter='all';updateMonthLbl();buildPills();render()}

function setTab(t,el){
  curTab=t;curFilter='all';
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
  el.classList.add('active');
  selectedCat=CATS[curTab][0].id;
  buildPills();buildCatBtns();render();
}

function buildPills(){
  var w=document.getElementById('pills');
  w.innerHTML='';
  w.appendChild(mkPill('all','🔖','Все'));
  CATS[curTab].forEach(function(c){w.appendChild(mkPill(c.id,c.icon,c.name))});
}
function mkPill(id,icon,name){
  var b=document.createElement('button');
  b.className='pill'+(id===curFilter?' active':'');
  b.innerHTML=icon+' '+name;
  b.onclick=function(){
    curFilter=id;
    document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('active')});
    b.classList.add('active');
    render();
  };
  return b;
}

// Кнопки категорий в форме — отдельная функция, selectedCat хранится глобально
function buildCatBtns(){
  var wrap=document.getElementById('catBtns');
  if(!wrap) return;
  wrap.innerHTML='';
  selectedCat=CATS[curTab][0].id; // сброс на первую
  CATS[curTab].forEach(function(c){
    var b=document.createElement('button');
    b.type='button';
    b.className='cat-btn'+(c.id===selectedCat?' active':'');
    b.innerHTML=c.icon+' '+c.name;
    b.onclick=function(){
      selectedCat=c.id;
      wrap.querySelectorAll('.cat-btn').forEach(function(x){x.classList.remove('active')});
      b.classList.add('active');
    };
    wrap.appendChild(b);
  });
}

function render(){renderSummary();renderList()}

function renderSummary(){
  var mo=entries.filter(function(e){var d=new Date(e.ts);return d.getFullYear()===curYear&&d.getMonth()===curMonth});
  var inc=mo.filter(function(e){return e.type==='income'}).reduce(function(s,e){return s+e.amount},0);
  var exp=mo.filter(function(e){return e.type==='expense'}).reduce(function(s,e){return s+e.amount},0);
  var bal=inc-exp;
  document.getElementById('sInc').textContent=fmt(inc)+' ₴';
  document.getElementById('sExp').textContent=fmt(exp)+' ₴';
  var bEl=document.getElementById('sBal');
  bEl.textContent=(bal<0?'-':'')+fmt(Math.abs(bal))+' ₴';
  bEl.style.color=bal>=0?'var(--accent)':'var(--red)';
  var pw=document.getElementById('pwrap');
  if(inc>0){
    pw.style.display='block';
    var pct=Math.min(100,Math.round(exp/inc*100));
    document.getElementById('pPct').textContent=pct+'%';
    var f=document.getElementById('pFill');
    f.style.width=pct+'%';
    f.className='pf'+(pct>80?' danger':'');
  } else {pw.style.display='none'}
}

function renderList(){
  var el=document.getElementById('list');
  var filtered=entries.filter(function(e){
    var d=new Date(e.ts);
    return e.type===curTab&&d.getFullYear()===curYear&&d.getMonth()===curMonth
      &&(curFilter==='all'||e.cat===curFilter);
  });
  if(!filtered.length){
    el.innerHTML='<div class="empty">📭<br><br>Записей нет.<br>Нажмите <b>+</b> чтобы добавить.</div>';
    return;
  }
  var days={};
  filtered.forEach(function(e){
    var d=new Date(e.ts);
    var k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    var lbl=d.toLocaleDateString('ru-RU',{weekday:'short',day:'numeric',month:'long'});
    if(!days[k]) days[k]={lbl:lbl,items:[]};
    days[k].items.push(e);
  });
  el.innerHTML='';
  Object.values(days).forEach(function(g){
    var grp=document.createElement('div');
    grp.innerHTML='<div class="dlbl">'+g.lbl+'</div>';
    g.items.forEach(function(e){
      var cat=getCat(e.type,e.cat);
      var d=document.createElement('div');
      d.className='entry';
      d.innerHTML=
        '<div class="el"><div class="eico">'+cat.icon+'</div>'+
        '<div class="einfo"><div class="ecat">'+cat.name+'</div>'+
        (e.note?'<div class="enote">'+esc(e.note)+'</div>':'')+
        '<div class="emeta">'+(e.who?'<span class="ewho">'+esc(e.who)+'</span>':'')+
        '</div></div></div>'+
        '<div class="er"><span class="eamt '+e.type+'">'+(e.type==='income'?'+':'-')+fmt(e.amount)+' ₴</span>'+
        '<button class="bdel" onclick="delEntry(\''+e.id+'\')">🗑 удалить</button></div>';
      grp.appendChild(d);
    });
    el.appendChild(grp);
  });
}

function addEntry(){
  var cat=selectedCat; // берём из глобальной переменной
  var raw=document.getElementById('amtInp').value.trim().replace(',','.');
  var amt=parseFloat(raw);
  var note=document.getElementById('noteInp').value.trim();
  if(!cat||!raw||isNaN(amt)||amt<=0){
    var inp=document.getElementById('amtInp');
    inp.style.borderColor='var(--red)';
    inp.focus();
    setTimeout(function(){inp.style.borderColor=''},2000);
    return;
  }
  var btn=document.getElementById('btnAdd');
  btn.disabled=true;btn.textContent='Сохранение…';
  var rec={type:curTab,cat:cat,amount:amt,note:note,who:uName?(uAv+' '+uName):'',ts:Date.now()};

  function onSaved(){
    sendTg(rec);
    document.getElementById('amtInp').value='';
    document.getElementById('noteInp').value='';
    btn.disabled=false;btn.textContent='+ Добавить запись';
    toggleForm();
  }

  if(fbDb){
    fbDb.ref('entries').push(rec).then(onSaved).catch(function(err){
      btn.disabled=false;btn.textContent='+ Добавить запись';
      alert('Ошибка: '+err.message);
    });
  } else {
    rec.id='loc_'+Date.now();
    entries.unshift(rec);
    saveLocal(entries);
    render();
    onSaved();
  }
}

function delEntry(id){
  if(!confirm('Удалить?')) return;
  if(fbDb){fbDb.ref('entries/'+id).remove()}
  else{entries=entries.filter(function(e){return e.id!==id});saveLocal(entries);render()}
}

function toggleForm(){
  formOpen=!formOpen;
  var f=document.getElementById('addForm');
  var fab=document.getElementById('fab');
  f.classList.toggle('visible',formOpen);
  fab.classList.toggle('open',formOpen);
  if(formOpen){
    buildCatBtns();
    setTimeout(function(){document.getElementById('amtInp').focus()},80);
  }
}

function sendTg(rec){
  var cat=getCat(rec.type,rec.cat);
  var typeWord=rec.type==='expense'?'💸 Расход':'💰 Доход';
  var text=typeWord+'\n'+(rec.who?'👤 '+rec.who+'\n':'')+cat.icon+' '+cat.name+' — '+fmt(rec.amount)+' ₴'+(rec.note?'\n📝 '+rec.note:'');
  fetch('https://api.telegram.org/bot'+TG_TOKEN+'/sendMessage',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:TG_CHAT,text:text})
  }).catch(function(){});
}

function openStat(){
  renderStat();
  document.getElementById('statOv').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeStat(){
  document.getElementById('statOv').classList.remove('show');
  document.body.style.overflow='';
}
function renderStat(){
  var mo=entries.filter(function(e){var d=new Date(e.ts);return d.getFullYear()===curYear&&d.getMonth()===curMonth});
  var expE=mo.filter(function(e){return e.type==='expense'});
  var incE=mo.filter(function(e){return e.type==='income'});
  var totExp=expE.reduce(function(s,e){return s+e.amount},0);
  var totInc=incE.reduce(function(s,e){return s+e.amount},0);
  var html='<div class="stotals"><div class="stcard inc"><div class="stcard-l">Доходы</div><div class="stcard-v">'+fmt(totInc)+' ₴</div></div><div class="stcard exp"><div class="stcard-l">Расходы</div><div class="stcard-v">'+fmt(totExp)+' ₴</div></div></div>';
  html+='<div class="stitle">⚡ Топ категорий</div>';
  if(expE.length){
    var cm={};expE.forEach(function(e){cm[e.cat]=(cm[e.cat]||0)+e.amount});
    var ca=Object.keys(cm).map(function(id){return{id:id,amt:cm[id]}}).sort(function(a,b){return b.amt-a.amt});
    var mx=ca[0].amt;
    ca.forEach(function(c,i){
      var cat=getCat('expense',c.id);
      var pct=totExp>0?Math.round(c.amt/totExp*100):0;
      var bw=Math.round(c.amt/mx*100);
      var medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      html+='<div class="nbar"><div class="nbar-head"><div class="nbar-cat">'+medal+cat.icon+' '+cat.name+'</div><div><span class="nbar-amt">'+fmt(c.amt)+' ₴</span><span class="nbar-pct">'+pct+'%</span></div></div><div class="nbar-track"><div class="nbar-fill" style="width:'+bw+'%"></div></div></div>';
    });
  } else { html+='<div style="padding:0 16px;color:var(--muted);font-size:.82rem">Нет расходов</div>'; }
  html+='<div class="stitle">💸 Кто тратит</div><div class="plist">';
  var pm={};
  expE.forEach(function(e){var w=e.who||'Неизвестно';if(!pm[w])pm[w]={total:0,cats:{}};pm[w].total+=e.amount;pm[w].cats[e.cat]=(pm[w].cats[e.cat]||0)+e.amount});
  var pa=Object.keys(pm).map(function(w){return{who:w,total:pm[w].total,cats:pm[w].cats}}).sort(function(a,b){return b.total-a.total});
  if(pa.length){
    var mx2=pa[0].total;
    pa.forEach(function(p){
      var pct=totExp>0?Math.round(p.total/totExp*100):0;
      var bw=Math.round(p.total/mx2*100);
      var parts=p.who.split(' ');var av=parts[0];var nm=parts.slice(1).join(' ')||p.who;
      var pcats=Object.keys(p.cats).map(function(id){return{id:id,amt:p.cats[id]}}).sort(function(a,b){return b.amt-a.amt}).slice(0,3);
      var chtml=pcats.map(function(c){var cat=getCat('expense',c.id);return'<span class="pcpill">'+cat.icon+' '+fmt(c.amt)+' ₴</span>'}).join('');
      html+='<div class="pcard"><div class="ptop"><div class="pwho"><span class="pav">'+esc(av)+'</span><span class="pname">'+esc(nm)+'</span></div><span class="ptotal">-'+fmt(p.total)+' ₴</span></div><div class="ptrack"><div class="pfill" style="width:'+bw+'%"></div></div><div class="ppct">'+pct+'% от общих расходов</div>'+(chtml?'<div class="pcats">'+chtml+'</div>':'')+' </div>';
    });
  } else { html+='<div style="color:var(--muted);font-size:.82rem;padding:0 16px">Нет данных</div>'; }
  html+='</div>';
  document.getElementById('statContent').innerHTML=html;
}

function openModal(){selAv=uAv;document.getElementById('nameInp').value=uName;hiAv(selAv);document.getElementById('nameModal').classList.add('show')}
function saveName(){var v=document.getElementById('nameInp').value.trim();if(!v){document.getElementById('nameInp').focus();return}uName=v;uAv=selAv;localStorage.setItem('uName',uName);localStorage.setItem('uAv',uAv);document.getElementById('nameModal').classList.remove('show');updateWhoBar()}
function pickAv(av,el){selAv=av;hiAv(av)}
function hiAv(av){document.querySelectorAll('.avb').forEach(function(b){b.classList.toggle('sel',b.textContent.trim()===av)})}
function updateWhoBar(){document.getElementById('wAv').textContent=uAv;document.getElementById('wName').textContent=uName||'Не указано'}
function fmt(n){return Number(n).toLocaleString('ru-RU',{maximumFractionDigits:0})}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
